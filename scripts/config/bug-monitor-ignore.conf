# bug-monitor-ignore.conf — Patterns to ignore when filing bug issues.
#
# One pattern per line. Lines starting with # are comments. Empty lines ignored.
# Patterns are matched against the normalized error message using grep -iE (extended regex).
#
# Examples:
#   DeprecationWarning
#   Expected 404.*not found
#   Content-Security-Policy.*violation

# Deprecation warnings (informational, not actionable bugs)
DeprecationWarning
deprecated

# Expected 404s from health checks and bots
GET.*favicon\.ico.*404
GET.*/robots\.txt.*404
GET.*/_next/.*404

# CSP violations from known browser extensions
Content-Security-Policy.*chrome-extension
Content-Security-Policy.*moz-extension

# Next.js development noise (should not appear in prod, but just in case)
Fast Refresh
HMR.*connected
