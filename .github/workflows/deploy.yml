name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.stage }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ inputs.stage }}
      cancel-in-progress: false
    environment: ${{ inputs.stage == 'production' && 'production' || '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ inputs.stage == 'production' && secrets.PROD_DATABASE_URL || secrets.STAGING_DATABASE_URL }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
        run: npx prisma migrate deploy

      - name: Deploy with SST
        run: npx sst deploy --stage ${{ inputs.stage }}
