name: Close Completed Plans

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]
  repository_dispatch:
    types: [plan-issue-closed]

permissions:
  issues: write
  pull-requests: write
  contents: read
  actions: write

jobs:
  close-plans:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    concurrency:
      group: close-plans-${{ github.event.issue.number || 'dispatch' }}
      cancel-in-progress: false
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Resolve closed issue numbers based on event type
            let closedIssueNumbers = [];
            if (context.eventName === 'issues') {
              closedIssueNumbers = [context.payload.issue.number];
            } else if (context.eventName === 'repository_dispatch') {
              const raw = (context.payload.client_payload && context.payload.client_payload.issue_numbers) || [];
              if (!Array.isArray(raw)) {
                console.log('client_payload.issue_numbers is not an array. Exiting.');
                return;
              }
              closedIssueNumbers = raw.filter(n => Number.isInteger(n) && n > 0);
            }

            if (closedIssueNumbers.length === 0) {
              console.log('No closed issue numbers resolved. Exiting.');
              return;
            }

            console.log(`Issue(s) ${closedIssueNumbers.map(n => '#' + n).join(', ')} closed. Checking for parent plan issues...`);

            // --- Step 1: Find open plan issues with claude-active label ---
            const planIssues = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'claude-active',
              per_page: 100
            });

            if (planIssues.data.length === 0) {
              console.log('No open plan issues with claude-active label found.');
              return;
            }

            console.log(`Found ${planIssues.data.length} open plan issue(s) with claude-active label.`);

            const issueRefPattern = /#(\d+)/g;

            // --- Step 2: For each plan issue, check if it references the closed issue ---
            for (const planIssue of planIssues.data) {
              console.log(`\nChecking plan issue #${planIssue.number}: ${planIssue.title}`);

              // Fetch comments to find the summary comment
              const comments = await github.rest.issues.listComments({
                owner, repo,
                issue_number: planIssue.number,
                per_page: 100
              });

              // Find the comment with the work issues summary
              const summaryComment = comments.data.find(c =>
                c.body && c.body.includes('### Work issues created')
              );

              if (!summaryComment) {
                console.log(`#${planIssue.number}: no summary comment found, skipping.`);
                continue;
              }

              // Parse issue numbers from table rows in the summary comment
              issueRefPattern.lastIndex = 0;
              const workIssueNumbers = [];
              const seenIssueNums = new Set();
              let match;
              while ((match = issueRefPattern.exec(summaryComment.body)) !== null) {
                const num = parseInt(match[1], 10);
                if (!seenIssueNums.has(num)) {
                  seenIssueNums.add(num);
                  workIssueNumbers.push(num);
                }
              }

              if (workIssueNumbers.length === 0) {
                console.log(`#${planIssue.number}: no issue references found in summary comment, skipping.`);
                continue;
              }

              // Check if any of the closed issues are among the work issues
              if (!closedIssueNumbers.some(n => workIssueNumbers.includes(n))) {
                console.log(`#${planIssue.number}: does not reference any of the closed issues (${closedIssueNumbers.map(n => '#' + n).join(', ')}), skipping.`);
                continue;
              }

              console.log(`#${planIssue.number}: references closed issue(s) from ${closedIssueNumbers.map(n => '#' + n).join(', ')}. Checking all work issues...`);

              // --- Step 3: Check if ALL work issues are closed ---
              let allClosed = true;
              const openIssues = [];
              const workIssueData = new Map();

              for (const workNum of workIssueNumbers) {
                const workIssue = await github.rest.issues.get({
                  owner, repo,
                  issue_number: workNum
                });
                workIssueData.set(workNum, workIssue.data);
                if (workIssue.data.state !== 'closed') {
                  allClosed = false;
                  openIssues.push(workNum);
                  console.log(`  #${workNum}: still open`);
                }
              }

              if (!allClosed) {
                console.log(`#${planIssue.number}: ${openIssues.length} work issue(s) still open: ${openIssues.map(n => '#' + n).join(', ')}`);
                continue;
              }

              // --- Step 3b: Create Final PR if FEATURE_BRANCH marker exists ---
              let finalPrNumber = null;

              // Search comments for the FEATURE_BRANCH marker
              const featureBranchComment = comments.data.find(c =>
                c.body && c.body.includes('<!-- FEATURE_BRANCH:')
              );

              if (featureBranchComment) {
                // Only trust markers from repo members (not arbitrary commenters)
                const trustedAssociations = ['OWNER', 'MEMBER', 'COLLABORATOR'];
                const authorAssoc = featureBranchComment.author_association;
                // Strict branch name: alphanumeric, hyphens, slashes, dots, underscores
                const branchMatch = trustedAssociations.includes(authorAssoc)
                  ? featureBranchComment.body.match(/<!-- FEATURE_BRANCH: ([\w\-\/.]+) -->/)
                  : null;

                if (!trustedAssociations.includes(authorAssoc)) {
                  console.log(`#${planIssue.number}: FEATURE_BRANCH marker from untrusted author (${authorAssoc}), skipping.`);
                } else if (branchMatch) {
                  const featureBranch = branchMatch[1].trim();
                  console.log(`#${planIssue.number}: found FEATURE_BRANCH marker: ${featureBranch}`);

                  // --- Duplicate PR guard (check before building PR body to save API calls) ---
                  try {
                    const existingPrs = await github.rest.pulls.list({
                      owner, repo,
                      head: `${owner}:${featureBranch}`,
                      base: 'main',
                      state: 'open'
                    });

                    if (existingPrs.data.length > 0) {
                      finalPrNumber = existingPrs.data[0].number;
                      console.log(`#${planIssue.number}: existing open PR #${finalPrNumber} found from ${featureBranch} to main, skipping PR creation.`);
                    }
                  } catch (err) {
                    console.log(`#${planIssue.number}: failed to check for existing PRs: ${err.message}`);
                  }

                  // --- Create PR if no duplicate found ---
                  if (!finalPrNumber) {
                    // Build task-to-PR mapping table
                    let mergedPrs = [];
                    try {
                      const prsResponse = await github.rest.pulls.list({
                        owner, repo,
                        state: 'closed',
                        per_page: 100
                      });
                      mergedPrs = prsResponse.data.filter(pr => pr.merged_at);
                    } catch (err) {
                      console.log(`  Failed to fetch PRs: ${err.message}`);
                    }

                    const sanitizeMd = (str) => str.replace(/[|[\]]/g, '\\$&');

                    const taskRows = [];
                    for (const workNum of workIssueNumbers) {
                      const cached = workIssueData.get(workNum);
                      const workTitle = cached ? sanitizeMd(cached.title) : `(issue #${workNum})`;

                      const closesPattern = new RegExp(`(?:closes|fixes|resolves)\\s+#${workNum}\\b`, 'i');
                      const linkedPr = mergedPrs.find(pr =>
                        pr.body && closesPattern.test(pr.body)
                      );

                      if (linkedPr) {
                        taskRows.push(`| #${workNum} | ${workTitle} | #${linkedPr.number} |`);
                      } else {
                        taskRows.push(`| #${workNum} | ${workTitle} | — |`);
                      }
                    }

                    const taskTable = [
                      '| Issue | Title | PR |',
                      '|-------|-------|----|',
                      ...taskRows
                    ].join('\n');

                    const prBody = [
                      `## Plan: #${planIssue.number}`,
                      '',
                      `**${planIssue.title}**`,
                      '',
                      '## Completed Tasks',
                      '',
                      taskTable,
                      '',
                      '---',
                      '',
                      '> **Note:** This PR should be **squash merged** to keep a clean commit history on main.'
                    ].join('\n');

                    try {
                      const pr = await github.rest.pulls.create({
                        owner, repo,
                        title: planIssue.title,
                        head: featureBranch,
                        base: 'main',
                        body: prBody
                      });

                      finalPrNumber = pr.data.number;
                      console.log(`#${planIssue.number}: created final PR #${finalPrNumber}`);
                    } catch (err) {
                      // Handle race condition: another run created the PR between our check and create
                      if (err.message && err.message.includes('already exists')) {
                        console.log(`#${planIssue.number}: PR already exists (race condition), fetching existing PR.`);
                        try {
                          const racePrs = await github.rest.pulls.list({
                            owner, repo,
                            head: `${owner}:${featureBranch}`,
                            base: 'main',
                            state: 'open'
                          });
                          if (racePrs.data.length > 0) {
                            finalPrNumber = racePrs.data[0].number;
                            console.log(`#${planIssue.number}: found existing PR #${finalPrNumber} after race.`);
                          }
                        } catch (raceErr) {
                          console.log(`#${planIssue.number}: failed to fetch PR after race: ${raceErr.message}`);
                        }
                      }

                      if (!finalPrNumber) {
                        core.warning(`#${planIssue.number}: failed to create final PR: ${err.message}`);
                        try {
                          await github.rest.issues.createComment({
                            owner, repo,
                            issue_number: planIssue.number,
                            body: `⚠️ Failed to create final PR from \`${featureBranch}\` → \`main\`:\n\n\`\`\`\n${err.message}\n\`\`\`\n\nFix the issue and close any work item to retry.`
                          });
                        } catch (commentErr) {
                          core.warning(`#${planIssue.number}: failed to post failure comment: ${commentErr.message}`);
                        }
                        continue;
                      }
                    }
                  }

                  // --- Dispatch CI on the feature branch ---
                  if (finalPrNumber) {
                    try {
                      await github.rest.actions.createWorkflowDispatch({
                        owner, repo,
                        workflow_id: 'ci.yml',
                        ref: featureBranch,
                        inputs: { ref: featureBranch }
                      });
                      console.log(`#${planIssue.number}: dispatched CI on branch ${featureBranch}`);
                    } catch (err) {
                      console.log(`#${planIssue.number}: failed to dispatch CI: ${err.message}`);
                    }
                  }
                }
              } else {
                console.log(`#${planIssue.number}: no FEATURE_BRANCH marker found, skipping final PR creation.`);
              }

              // --- Step 4: All work issues closed — update the plan issue ---
              const issueList = workIssueNumbers.map(n => `#${n}`).join(', ');

              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: planIssue.number,
                labels: ['claude-done']
              });

              try {
                await github.rest.issues.removeLabel({
                  owner, repo,
                  issue_number: planIssue.number,
                  name: 'claude-active'
                });
              } catch (err) {
                console.log(`  Warning: could not remove claude-active label: ${err.message}`);
              }

              if (finalPrNumber) {
                // Plan has a final PR — keep issue open until PR merges
                console.log(`#${planIssue.number}: all work items completed! Final PR #${finalPrNumber} — plan stays open until merged.`);

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: planIssue.number,
                  body: `All work complete. Final PR: #${finalPrNumber} — plan will close when the PR is merged.`
                });
              } else {
                // No feature branch / no final PR — close immediately
                console.log(`#${planIssue.number}: all work items completed! Closing plan.`);

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: planIssue.number,
                  body: `All work items completed. Closing plan. Issues: ${issueList}.`
                });

                await github.rest.issues.update({
                  owner, repo,
                  issue_number: planIssue.number,
                  state: 'closed'
                });
              }

              // --- Step 5: Close linked bug issues (DUPLICATED: keep in sync with close-plan-on-merge job) ---
              // Only close bugs immediately when there's no final PR (otherwise defer to close-plan-on-merge)
              if (finalPrNumber) {
                console.log(`#${planIssue.number}: deferring bug closure until final PR merges.`);
                continue;
              }

              const bugMarkerMatch = (planIssue.body || '').match(/<!-- BUG_ISSUE: #(\d+) -->/);
              if (bugMarkerMatch) {
                const bugIssueNumber = parseInt(bugMarkerMatch[1], 10);
                console.log(`#${planIssue.number}: found BUG_ISSUE marker referencing #${bugIssueNumber}. Closing bug issue.`);

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: bugIssueNumber,
                  body: `Closing: all work items in plan issue #${planIssue.number} have been completed.`
                });

                await github.rest.issues.update({
                  owner, repo,
                  issue_number: bugIssueNumber,
                  state: 'closed'
                });
              }

              // --- Step 5b: Fallback — parse plan title for bug #N references ---
              const titleBugPattern = /bug\s*#(\d+)/gi;
              let titleBugMatch;
              const closedFromMarker = bugMarkerMatch ? parseInt(bugMarkerMatch[1], 10) : null;

              while ((titleBugMatch = titleBugPattern.exec(planIssue.title)) !== null) {
                const bugNum = parseInt(titleBugMatch[1], 10);

                // Skip if already closed via BUG_ISSUE marker
                if (bugNum === closedFromMarker) {
                  console.log(`#${planIssue.number}: bug #${bugNum} already closed via BUG_ISSUE marker, skipping.`);
                  continue;
                }

                // Check if the bug is still open before closing
                try {
                  const bugIssue = await github.rest.issues.get({
                    owner, repo,
                    issue_number: bugNum
                  });

                  if (bugIssue.data.state === 'closed') {
                    console.log(`#${planIssue.number}: bug #${bugNum} from title is already closed, skipping.`);
                    continue;
                  }

                  console.log(`#${planIssue.number}: closing bug #${bugNum} referenced in plan title.`);

                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: bugNum,
                    body: `Closing: all work items in plan issue #${planIssue.number} have been completed.`
                  });

                  await github.rest.issues.update({
                    owner, repo,
                    issue_number: bugNum,
                    state: 'closed'
                  });
                } catch (err) {
                  console.log(`#${planIssue.number}: failed to close bug #${bugNum}: ${err.message}`);
                }
              }
            }

  close-plan-on-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prBody = context.payload.pull_request.body || '';

            // Parse "## Plan: #N" from PR body
            const planMatch = prBody.match(/## Plan: #(\d+)/);
            if (!planMatch) {
              console.log('No "## Plan: #N" marker found in PR body. Skipping.');
              return;
            }

            const planNumber = parseInt(planMatch[1], 10);
            console.log(`Found plan reference: #${planNumber}`);

            // Fetch the plan issue
            let planIssue;
            try {
              const { data } = await github.rest.issues.get({
                owner, repo,
                issue_number: planNumber
              });
              planIssue = data;
            } catch (err) {
              console.log(`Failed to fetch plan issue #${planNumber}: ${err.message}`);
              return;
            }

            if (planIssue.state === 'closed') {
              console.log(`Plan issue #${planNumber} is already closed. Skipping.`);
              return;
            }

            // Close the plan issue
            console.log(`Closing plan issue #${planNumber}`);

            try {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: planNumber,
                body: `Plan complete — final PR #${context.payload.pull_request.number} has been merged to main.`
              });
            } catch (err) {
              console.log(`Failed to comment on plan issue #${planNumber}: ${err.message}`);
            }

            try {
              await github.rest.issues.update({
                owner, repo,
                issue_number: planNumber,
                state: 'closed'
              });
            } catch (err) {
              core.warning(`Failed to close plan issue #${planNumber}: ${err.message}`);
              return;
            }

            // --- Close linked bug issues (DUPLICATED: keep in sync with close-plans job Step 5/5b) ---
            const bugMarkerMatch = (planIssue.body || '').match(/<!-- BUG_ISSUE: #(\d+) -->/);
            if (bugMarkerMatch) {
              const bugIssueNumber = parseInt(bugMarkerMatch[1], 10);
              console.log(`#${planNumber}: found BUG_ISSUE marker referencing #${bugIssueNumber}. Closing bug issue.`);

              try {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: bugIssueNumber,
                  body: `Closing: plan issue #${planNumber} final PR has been merged.`
                });

                await github.rest.issues.update({
                  owner, repo,
                  issue_number: bugIssueNumber,
                  state: 'closed'
                });
              } catch (err) {
                console.log(`Failed to close bug issue #${bugIssueNumber}: ${err.message}`);
              }
            }

            // Fallback — parse plan title for bug #N references
            const titleBugPattern = /bug\s*#(\d+)/gi;
            let titleBugMatch;
            const closedFromMarker = bugMarkerMatch ? parseInt(bugMarkerMatch[1], 10) : null;

            while ((titleBugMatch = titleBugPattern.exec(planIssue.title)) !== null) {
              const bugNum = parseInt(titleBugMatch[1], 10);

              if (bugNum === closedFromMarker) {
                console.log(`#${planNumber}: bug #${bugNum} already closed via BUG_ISSUE marker, skipping.`);
                continue;
              }

              try {
                const { data: bugIssue } = await github.rest.issues.get({
                  owner, repo,
                  issue_number: bugNum
                });

                if (bugIssue.state === 'closed') {
                  console.log(`#${planNumber}: bug #${bugNum} is already closed, skipping.`);
                  continue;
                }

                console.log(`#${planNumber}: closing bug #${bugNum} referenced in plan title.`);

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: bugNum,
                  body: `Closing: plan issue #${planNumber} final PR has been merged.`
                });

                await github.rest.issues.update({
                  owner, repo,
                  issue_number: bugNum,
                  state: 'closed'
                });
              } catch (err) {
                console.log(`#${planNumber}: failed to close bug #${bugNum}: ${err.message}`);
              }
            }
