name: Close Completed Plans

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  close-plans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const closedIssueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Issue #${closedIssueNumber} was closed. Checking for parent plan issues...`);

            // --- Step 1: Find open plan issues with claude-active label ---
            const planIssues = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'claude-active',
              per_page: 100
            });

            if (planIssues.data.length === 0) {
              console.log('No open plan issues with claude-active label found.');
              return;
            }

            console.log(`Found ${planIssues.data.length} open plan issue(s) with claude-active label.`);

            const issueRefPattern = /#(\d+)/g;

            // --- Step 2: For each plan issue, check if it references the closed issue ---
            for (const planIssue of planIssues.data) {
              console.log(`\nChecking plan issue #${planIssue.number}: ${planIssue.title}`);

              // Fetch comments to find the summary comment
              const comments = await github.rest.issues.listComments({
                owner, repo,
                issue_number: planIssue.number,
                per_page: 100
              });

              // Find the comment with the work issues summary
              const summaryComment = comments.data.find(c =>
                c.body && c.body.includes('### Work issues created')
              );

              if (!summaryComment) {
                console.log(`#${planIssue.number}: no summary comment found, skipping.`);
                continue;
              }

              // Parse issue numbers from table rows in the summary comment
              const workIssueNumbers = [];
              let match;
              while ((match = issueRefPattern.exec(summaryComment.body)) !== null) {
                workIssueNumbers.push(parseInt(match[1], 10));
              }

              if (workIssueNumbers.length === 0) {
                console.log(`#${planIssue.number}: no issue references found in summary comment, skipping.`);
                continue;
              }

              // Check if the closed issue is among the work issues
              if (!workIssueNumbers.includes(closedIssueNumber)) {
                console.log(`#${planIssue.number}: does not reference closed issue #${closedIssueNumber}, skipping.`);
                continue;
              }

              console.log(`#${planIssue.number}: references closed issue #${closedIssueNumber}. Checking all work issues...`);

              // --- Step 3: Check if ALL work issues are closed ---
              let allClosed = true;
              const openIssues = [];

              for (const workNum of workIssueNumbers) {
                const workIssue = await github.rest.issues.get({
                  owner, repo,
                  issue_number: workNum
                });
                if (workIssue.data.state !== 'closed') {
                  allClosed = false;
                  openIssues.push(workNum);
                  console.log(`  #${workNum}: still open`);
                }
              }

              if (!allClosed) {
                console.log(`#${planIssue.number}: ${openIssues.length} work issue(s) still open: ${openIssues.map(n => '#' + n).join(', ')}`);
                continue;
              }

              // --- Step 4: All work issues closed — close the plan issue ---
              const issueList = workIssueNumbers.map(n => `#${n}`).join(', ');
              console.log(`#${planIssue.number}: all work items completed! Closing plan.`);

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: planIssue.number,
                body: `All work items completed. Closing plan. Issues: ${issueList}.`
              });

              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: planIssue.number,
                labels: ['claude-done']
              });

              await github.rest.issues.removeLabel({
                owner, repo,
                issue_number: planIssue.number,
                name: 'claude-active'
              });

              await github.rest.issues.update({
                owner, repo,
                issue_number: planIssue.number,
                state: 'closed'
              });
            }
