name: Unblock Dependent Issues

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  unblock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // --- Step 1: Determine which issues were closed based on event type ---
            const closedIssueNumbers = new Set();
            let triggerDescription;

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;

              // Only act on merged PRs, not closed-without-merge
              if (!pr.merged) {
                console.log('PR was closed without merging, skipping.');
                return;
              }

              // Parse "Closes #N", "Fixes #N", "Resolves #N" from PR body and title
              const closingPattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
              const text = `${pr.title}\n${pr.body || ''}`;
              let match;
              while ((match = closingPattern.exec(text)) !== null) {
                closedIssueNumbers.add(parseInt(match[1], 10));
              }

              triggerDescription = `merged via PR #${pr.number}`;
            } else if (context.eventName === 'issues') {
              const issue = context.payload.issue;

              // Skip if the "issue" is actually a PR (GitHub treats PRs as issues)
              if (issue.pull_request) {
                console.log('Closed item is a PR, not an issue. Skipping.');
                return;
              }

              closedIssueNumbers.add(issue.number);
              triggerDescription = `issue #${issue.number} closed`;
            }

            if (closedIssueNumbers.size === 0) {
              console.log('No closed issues identified, skipping.');
              return;
            }

            console.log(`Trigger: ${triggerDescription}. Closed issues: ${[...closedIssueNumbers].map(n => '#' + n).join(', ')}`);

            // --- Step 2: Find open issues that depend on any of the closed issues ---
            const dependentIssues = new Set();

            for (const closedNum of closedIssueNumbers) {
              const searchResults = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:issue is:open "#${closedNum}" in:body`,
                per_page: 50
              });

              for (const item of searchResults.data.items) {
                if (item.body && item.body.includes('### Dependencies') && item.body.includes(`#${closedNum}`)) {
                  dependentIssues.add(item.number);
                }
              }
            }

            if (dependentIssues.size === 0) {
              console.log('No dependent issues found.');
              return;
            }

            console.log(`Found potential dependent issues: ${[...dependentIssues].map(n => '#' + n).join(', ')}`);

            // --- Step 3: For each dependent issue, check if ALL dependencies are resolved ---
            for (const depIssueNum of dependentIssues) {
              const issue = await github.rest.issues.get({
                owner, repo,
                issue_number: depIssueNum
              });

              // Skip if already has an active workflow label
              const labels = issue.data.labels.map(l => l.name);
              if (labels.includes('claude-ready') || labels.includes('claude-wip') || labels.includes('claude-done')) {
                console.log(`#${depIssueNum}: already has active label, skipping.`);
                continue;
              }

              // Extract the Dependencies section from the issue body
              const body = issue.data.body || '';
              const depsMatch = body.match(/### Dependencies\s*\n([\s\S]*?)(?:\n###|\n$|$)/);
              if (!depsMatch) {
                console.log(`#${depIssueNum}: no Dependencies section found, skipping.`);
                continue;
              }

              // Parse all issue references from the Dependencies section
              const depsSection = depsMatch[1];
              const depNumbers = [];
              const issueRefPattern = /#(\d+)/g;
              let refMatch;
              while ((refMatch = issueRefPattern.exec(depsSection)) !== null) {
                depNumbers.push(parseInt(refMatch[1], 10));
              }

              if (depNumbers.length === 0) {
                console.log(`#${depIssueNum}: no issue references in Dependencies section, skipping.`);
                continue;
              }

              // Check if ALL dependency issues are closed
              let allResolved = true;
              for (const depNum of depNumbers) {
                const depIssue = await github.rest.issues.get({
                  owner, repo,
                  issue_number: depNum
                });
                if (depIssue.data.state !== 'closed') {
                  console.log(`#${depIssueNum}: dependency #${depNum} is still open.`);
                  allResolved = false;
                  break;
                }
              }

              if (allResolved) {
                // Remove 'blocked' label if present
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo,
                    issue_number: depIssueNum,
                    name: 'blocked'
                  });
                } catch (e) {
                  console.log(`#${depIssueNum}: 'blocked' label not present, skipping removal.`);
                }

                // Check if this issue belongs to an auto-approved plan
                const parentPlanMatch = body.match(/<!-- PARENT_PLAN: #(\d+) -->/);
                let autoApprove = false;

                if (parentPlanMatch) {
                  const parentNumber = parseInt(parentPlanMatch[1], 10);
                  try {
                    const parentIssue = await github.rest.issues.get({
                      owner, repo,
                      issue_number: parentNumber
                    });
                    const parentLabels = parentIssue.data.labels.map(l => l.name);
                    autoApprove = parentLabels.includes('plan-auto-approved');
                    console.log(`#${depIssueNum}: parent plan #${parentNumber} auto-approved=${autoApprove}`);
                  } catch (e) {
                    console.log(`#${depIssueNum}: could not fetch parent plan #${parentNumber}, falling back to manual review.`);
                  }
                }

                if (autoApprove) {
                  console.log(`#${depIssueNum}: all dependencies resolved, auto-approving (parent plan approved).`);
                  await github.rest.issues.addLabels({
                    owner, repo,
                    issue_number: depIssueNum,
                    labels: ['claude-ready']
                  });

                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: depIssueNum,
                    body: `All dependencies resolved (${triggerDescription}). Auto-approved via parent plan. Marking as \`claude-ready\`.`
                  });
                } else {
                  console.log(`#${depIssueNum}: all dependencies resolved, requires human review.`);
                  await github.rest.issues.addLabels({
                    owner, repo,
                    issue_number: depIssueNum,
                    labels: ['needs-human-review']
                  });

                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: depIssueNum,
                    body: `All dependencies resolved (${triggerDescription}). Marking as \`needs-human-review\` for human review. Comment \`/go\` or 👍 to approve.`
                  });
                }
              }
            }
