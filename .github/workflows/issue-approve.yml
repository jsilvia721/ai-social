name: Approve Issue

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  approve:
    if: >-
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'needs-human-review') &&
      (
        contains(github.event.comment.body, '/go') ||
        contains(github.event.comment.body, '/approve') ||
        contains(github.event.comment.body, '👍') ||
        github.event.comment.body == ':+1:' ||
        contains(github.event.comment.body, 'approved') ||
        contains(github.event.comment.body, 'Approved')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const labels = context.payload.issue.labels.map(l => l.name);
            const body = context.payload.issue.body || '';

            // Remove the review trigger label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: 'needs-human-review'
            });

            // Detect plan issues by body content (authoritative) OR label
            const isPlan = body.includes('PLAN_ITEMS_START') || labels.includes('plan');

            if (isPlan) {
              // Plan issues: check for PLAN_ITEMS markers
              if (body.includes('PLAN_ITEMS_START')) {
                // Ensure plan label is present for downstream daemon routing
                if (!labels.includes('plan')) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    labels: ['plan']
                  });
                }

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  labels: ['claude-approved']
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: 'Plan approved. The issue daemon will pick this up and create work issues shortly.'
                });
              } else {
                // Re-add needs-human-review since we can't route without markers
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  labels: ['needs-human-review']
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: '⚠️ Plan is missing `PLAN_ITEMS_START` / `PLAN_ITEMS_END` markers. Cannot approve until the plan body contains structured plan items.'
                });
              }
            } else if (labels.includes('bug-report')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: ['bug-investigate']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: 'Bug approved for investigation. A plan will be created shortly.'
              });
            } else {
              // Default: any other issue type
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: ['claude-ready']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: 'Issue approved for implementation. The issue daemon will pick this up shortly.'
              });
            }
