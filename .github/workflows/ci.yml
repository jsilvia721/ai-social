name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ── Lint & Type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  # ── Test & Coverage ────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci

  # ── E2E Tests ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: [test]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ai_social_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/ai_social_e2e?sslmode=disable
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-test-secret-at-least-32-chars-long
      GOOGLE_CLIENT_ID: e2e-google-client-id
      GOOGLE_CLIENT_SECRET: e2e-google-client-secret
      ANTHROPIC_API_KEY: e2e-anthropic-api-key
      BLOTATO_API_KEY: e2e-blotato-api-key
      SES_FROM_EMAIL: noreply@example.com
      ALLOWED_EMAILS: test@example.com
      NODE_ENV: test
      AWS_S3_BUCKET: e2e-test-bucket
      AWS_S3_PUBLIC_URL: http://localhost:9000/e2e-test-bucket
      PLAYWRIGHT_E2E: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push

      - name: Seed test data
        run: npx tsx prisma/seed.ts

      - name: Build Next.js
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [e2e]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set stage
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "STAGE=production" >> $GITHUB_ENV
          else
            echo "STAGE=staging" >> $GITHUB_ENV
          fi

      - name: Echo migration target
        run: |
          echo "Running migrations against: $(echo $DATABASE_URL | sed 's/:[^:@]*@/@/')"

      - name: Run DB migrations (production)
        if: github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Run DB migrations (staging)
        if: github.ref == 'refs/heads/staging'
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Deploy with SST
        run: npx sst deploy --stage $STAGE
