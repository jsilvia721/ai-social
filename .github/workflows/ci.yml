name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Check Prisma schema has matching migration
        env:
          GH_EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # If schema.prisma changed, a new migration must also be present
          if [ "$GH_EVENT" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            git fetch origin "$BASE_SHA" --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git fetch origin "$BEFORE_SHA" --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only "$BEFORE_SHA" HEAD)
          else
            echo "Schema/migration check skipped (no base ref available)"
            exit 0
          fi
          if echo "$CHANGED" | grep -q "prisma/schema.prisma"; then
            if ! echo "$CHANGED" | grep -q "prisma/migrations/"; then
              echo "::error::prisma/schema.prisma was modified but no new migration was added. Run: npx prisma migrate dev --name <name>"
              exit 1
            fi
          fi
          echo "Schema/migration check passed"

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  # ── Test & Coverage ────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci

  # ── E2E Tests ──────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ai_social_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/ai_social_e2e?sslmode=disable
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-test-secret-at-least-32-chars-long
      GOOGLE_CLIENT_ID: e2e-google-client-id
      GOOGLE_CLIENT_SECRET: e2e-google-client-secret
      ANTHROPIC_API_KEY: e2e-anthropic-api-key
      REPLICATE_API_TOKEN: e2e-replicate-api-token
      BLOTATO_API_KEY: e2e-blotato-api-key
      SES_FROM_EMAIL: noreply@example.com
      ALLOWED_EMAILS: test@example.com
      NODE_ENV: test
      AWS_S3_BUCKET: e2e-test-bucket
      AWS_S3_PUBLIC_URL: http://localhost:9000/e2e-test-bucket
      PLAYWRIGHT_E2E: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push

      - name: Seed test data
        run: npx tsx prisma/seed.ts

      - name: Build Next.js
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy to Staging (automatic on merge to main) ─────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [lint, test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run DB migrations (staging)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
        run: npx prisma migrate deploy

      - name: Deploy with SST
        run: npx sst deploy --stage staging

  # ── Deploy to Production (manual approval after staging) ───────────────────
  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run DB migrations (production)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
        run: npx prisma migrate deploy

      - name: Deploy with SST
        run: npx sst deploy --stage production
