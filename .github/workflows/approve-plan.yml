name: Approve Plan

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  approve:
    if: >-
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'claude-plan-review') &&
      (contains(github.event.comment.body, '/approve') || contains(github.event.comment.body, 'approved') || contains(github.event.comment.body, 'Approved'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: 'claude-plan-review'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['claude-approved']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: 'Plan approved. The issue daemon will pick this up and create work issues shortly.'
            });
