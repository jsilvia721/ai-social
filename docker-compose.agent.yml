# docker-compose.agent.yml — Run the autonomous issue-daemon agent in Docker.
#
# Usage:
#   # First, copy and fill in credentials:
#   cp .env.docker.example .env.docker
#
#   docker compose -f docker-compose.agent.yml up --build        # build + run
#   docker compose -f docker-compose.agent.yml up -d             # detached
#   docker compose -f docker-compose.agent.yml logs -f agent     # follow logs
#   docker compose -f docker-compose.agent.yml down               # stop
#
#   # Status endpoint (while running):
#   curl http://localhost:7420/status | jq .
#   curl http://localhost:7420/health
#
# Credentials:
#   All secrets are loaded from .env.docker (gitignored, never committed).
#   See .env.docker.example for the full list of required/optional variables.

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ai-social-agent
    restart: unless-stopped

    # Load credentials from gitignored env file (required: true means fail if missing)
    env_file:
      - path: .env.docker
        required: true

    # Non-secret environment config
    environment:
      - NODE_ENV=production
      - AGENT_STATUS_PORT=7420

    # Resource limits — adjust based on your machine
    deploy:
      resources:
        limits:
          cpus: "${AGENT_CPU_LIMIT:-2.0}"
          memory: ${AGENT_MEMORY_LIMIT:-4G}
        reservations:
          cpus: "0.5"
          memory: 512M

    # Tmpfs for /tmp to limit disk usage
    tmpfs:
      - /tmp:size=256M

    ports:
      # Status endpoint — bound to localhost only (not exposed to network)
      - "127.0.0.1:${AGENT_STATUS_PORT:-7420}:7420"

    # Container security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    volumes:
      # Repo mounted read-only — entrypoint clones into writable location
      - .:/workspace:ro
      # Writable volume for cloned repo, worktrees, and logs
      - agent-workdir:/agent-workdir
      # Claude CLI auth (read-only) — keeps credentials on host
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/agent/.claude:ro

    # Override default CMD to use env-configurable workers
    command:
      - "-w"
      - "${AGENT_MAX_WORKERS:-1}"
      - "-i"
      - "${AGENT_POLL_INTERVAL:-60}"
      - "-b"
      - "${AGENT_MAX_BUDGET:-50}"

    # Logging limits to prevent disk exhaustion
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  agent-workdir:
