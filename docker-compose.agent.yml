# docker-compose.agent.yml — Run the autonomous issue-daemon agent in Docker.
#
# Usage:
#   docker compose -f docker-compose.agent.yml up --build
#   docker compose -f docker-compose.agent.yml up -d        # detached
#   docker compose -f docker-compose.agent.yml logs -f agent # follow logs
#   docker compose -f docker-compose.agent.yml down          # stop
#
# Environment variables (set in shell or .env file):
#   ANTHROPIC_API_KEY  — Required. Claude API key.
#   GITHUB_TOKEN       — Required. GitHub personal access token with repo scope.
#   DATABASE_URL       — Optional. Database connection string.
#
# Resource limits can be adjusted below or via environment variables.

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: ai-social-agent
    restart: unless-stopped

    # Resource limits — adjust based on your machine
    deploy:
      resources:
        limits:
          cpus: "${AGENT_CPU_LIMIT:-2.0}"
          memory: ${AGENT_MEMORY_LIMIT:-4G}
        reservations:
          cpus: "0.5"
          memory: 512M

    # Tmpfs for /tmp to limit disk usage (256MB max)
    tmpfs:
      - /tmp:size=256M

    # Environment variables — secrets passed at runtime, never baked in
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE_URL=${DATABASE_URL:-}
      - NODE_ENV=production
      # Agent-specific config
      - AGENT_MAX_WORKERS=${AGENT_MAX_WORKERS:-1}
      - AGENT_POLL_INTERVAL=${AGENT_POLL_INTERVAL:-60}
      - AGENT_MAX_BUDGET=${AGENT_MAX_BUDGET:-50}

    volumes:
      # Mount the repo read-only — agent uses worktrees for writes
      - .:/workspace:ro
      # Writable volume for agent worktrees and logs
      - agent-workdir:/agent-workdir

    # Override default CMD to use env-configurable workers
    command: ["-w", "${AGENT_MAX_WORKERS:-1}", "-i", "${AGENT_POLL_INTERVAL:-60}", "-b", "${AGENT_MAX_BUDGET:-50}"]

    # Logging limits to prevent disk exhaustion
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  agent-workdir:
