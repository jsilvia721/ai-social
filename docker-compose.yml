services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_social
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    profiles:
      - agent
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    volumes:
      - .:/repo:ro
      - agent_workdir:/workdir
    environment:
      - GITHUB_TOKEN
      - ANTHROPIC_API_KEY
      - DATABASE_URL
      - NODE_ENV

volumes:
  postgres_data:
  agent_workdir:
